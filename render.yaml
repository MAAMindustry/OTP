services:
  - type: web
    name: one-touch-million
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NOTCHPAY_PUBLIC_KEY
        sync: false
      - key: NOTCHPAY_PRIVATE_KEY
        sync: false
      - key: NOTCHPAY_HASH_KEY
        sync: false
      - key: SITE_URL
        sync: false
      # Email pour réinitialisation mot de passe
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
